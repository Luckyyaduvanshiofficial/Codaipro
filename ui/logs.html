<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codai Pro - Developer Terminal</title>
    <link rel="icon" type="image/x-icon" href="codai.ico">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #121212;
            --primary: #10b981;
            --text: #e5e7eb;
            --border: #262626;
        }
        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Cascadia Code', 'Consolas', 'Monaco', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 1rem 1.5rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .title {
            font-size: 0.9rem;
            color: var(--primary);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .back-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .back-btn:hover {
            background: var(--border);
        }
        #terminal {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            font-size: 13px;
            line-height: 1.6;
            scroll-behavior: smooth;
        }
        .log-section {
            margin-bottom: 25px;
        }
        .section-header {
            color: #60a5fa;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 4px;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .log-line {
            white-space: pre-wrap;
            margin-bottom: 2px;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #404040; }
        
        #error-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .error-card {
            background: var(--surface);
            padding: 30px;
            border: 1px solid #ef4444;
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <div class="title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
            Codai Real-Time Telemetry
        </div>
        <a href="index.html" class="back-btn">← Back to Chat</a>
    </header>

    <div id="terminal">
        <div class="log-section">
            <div class="section-header">Codai Proxy Gateway</div>
            <div id="proxy-logs">Waiting for telemetry...</div>
        </div>
        <div class="log-section">
            <div class="section-header">Llama Engine Subprocess</div>
            <div id="engine-logs">Waiting for model spin-up...</div>
        </div>
    </div>

    <div id="error-overlay">
        <div class="error-card">
            <h2 style="color:#ef4444; margin-top:0;">Access Forbidden</h2>
            <p>Debug mode is currently disabled in the backend.</p>
            <p style="color:#888; font-size: 0.9rem;">To view logs, set <code>CODAI_DEBUG=true</code> in your environment.</p>
        </div>
    </div>

    <script>
        const baseUrl = window.location.protocol === "file:" ? "http://127.0.0.1:8080" : window.location.origin;
        const proxyDiv = document.getElementById('proxy-logs');
        const engineDiv = document.getElementById('engine-logs');
        const terminal = document.getElementById('terminal');
        const overlay = document.getElementById('error-overlay');

        function renderLines(container, lines) {
            container.innerHTML = '';
            lines.forEach(line => {
                const entry = document.createElement('div');
                entry.className = 'log-line';
                entry.textContent = line;
                container.appendChild(entry);
            });
        }

        async function fetchLogs() {
            try {
                const resp = await fetch(`${baseUrl}/logs`);
                if (resp.status === 403) {
                    overlay.style.display = 'flex';
                    return;
                }
                if (!resp.ok) {
                    // For other errors (e.g., 500), show overlay or log error
                    overlay.style.display = 'flex';
                    console.error(`Failed to fetch logs: HTTP ${resp.status}`);
                    return;
                }
                const envelope = await resp.json();
                const data = envelope.data || {};

                // Success - hide overlay
                overlay.style.display = 'none';

                // Track scroll position
                const isScrolled = terminal.scrollHeight - terminal.clientHeight <= terminal.scrollTop + 50;

                if (Array.isArray(data.codai)) {
                    renderLines(proxyDiv, data.codai);
                }
                if (Array.isArray(data.engine)) {
                    renderLines(engineDiv, data.engine);
                }

                if (isScrolled) {
                    terminal.scrollTop = terminal.scrollHeight;
                }
            } catch (e) {
                console.error("Failed to poll logs", e);
            }
        }

        setInterval(fetchLogs, 2000);
        fetchLogs();
    </script>
</body>
</html>
